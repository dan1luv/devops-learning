name: Site Monitor

on:
 push:
  branches:
   - main
 schedule:
  - cron: '0 9 * * *'

jobs:
 check:
  runs-on: ubuntu-latest

  steps:
   - name: Checkout code
     uses: actions/checkout@v4

   - name: Set up Python
     uses: actions/setup-python@v5
     with:
      python-version: '3.12'

   - name: Install dependencies
     run: pip install certifi

   - name: Run site checker
     run: python3 week-02/check_sites.py
